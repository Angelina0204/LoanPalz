<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanPalz | Alternative Credit Scoring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f8f8;
            --card-light: #ffffff;
            --card-dark: #111111;
            --text-main: #0a0a0a;
            --text-muted: #5a5a5a;
            --text-light: #f8f8f8;
            --text-muted-light: #a0a0a0;
            --accent: #56B33B;
            --accent-hover: #45962e;
            --border-radius: 20px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-light);
            padding: 20px 5vw;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0,0,0,0.03);
            transition: var(--transition);
        }

        .logo a {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background-color: var(--accent);
            border-radius: 50%;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Layout Container */
        .container {
            padding: 40px 5vw;
            max-width: 1400px;
            margin: 0 auto;
            flex: 1;
            width: 100%;
        }

        /* Global UI Elements */
        .btn-primary {
            display: inline-block;
            padding: 16px 32px;
            background: var(--accent);
            color: var(--card-light);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
            margin-bottom: 60px;
        }

        .bento-card {
            background: var(--card-light);
            border-radius: var(--border-radius);
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
        }

        .bento-card.dark {
            background: var(--card-dark);
            color: var(--text-light);
        }

        .bento-card h2, .bento-card h3 {
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        /* Footer */
        .footer {
            background: var(--card-dark);
            color: var(--text-light);
            padding: 60px 5vw;
            text-align: center;
            margin-top: auto;
        }

        .footer h2 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .footer p {
            color: var(--text-muted-light);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a href="/">
                <div class="logo-dot"></div>
                LoanPalz
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/dashboard/">Model Intelligence</a></li>
            <li><a href="/history/">Prediction History</a></li>
            <li><a href="/score/">Try Scoring</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <h2>LoanPalz — AI Powered Alternative Credit Scoring</h2>
        <p>Built for Financial Inclusion | Explainable AI | Ethical Lending</p>
    </footer>

</body>
</html>
